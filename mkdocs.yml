site_name: foogent — AI受発注自動一元管理システム
site_description: AINOK — Microsoft Agent Hackathon 2026
repo_url: https://github.com/okita-noon/ms-agent-hackathon
repo_name: okita-noon/ms-agent-hackathon

theme:
  name: material
  language: ja
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - 図解フロー: visual-flows.md
  - アーキテクチャ概要: architecture-overview.md
  - マルチエージェント設計: multi-agent-design.md
  - ダッシュボードAgent設計: dashboard-agent-design.md
  - Connector層・マルチテナント: connector-design.md
  - データフロー: data-flow.md
  - LINE会話履歴参照設計: line-conversation-memory.md
  - メールチャネル設計: email-channel-design.md
  - デプロイ分割設計: deployment-split.md
  - MVPスコープ: mvp-scope.md
  - 認証セットアップ: auth-setup.md
  - 電話チャネル テスト: phone-testing.md
  - セキュリティ: security.md
