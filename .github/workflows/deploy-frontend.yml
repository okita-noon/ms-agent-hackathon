name: Deploy frontend to Storage Static Website

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-orderai-dev2
  STORAGE_ACCOUNT_NAME: storderaidev2
  VITE_API_BASE_URL: https://ca-api-orderai-dev2.mangoground-6945bb56.japaneast.azurecontainerapps.io
  VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
  VITE_ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable static website
        run: |
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --account-name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --query "[0].value" \
            -o tsv)
          az storage blob service-properties update \
            --account-name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --account-key "$ACCOUNT_KEY" \
            --static-website \
            --index-document "index.html" \
            --404-document "index.html"

      - name: Upload frontend
        run: |
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --account-name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --query "[0].value" \
            -o tsv)
          # index.html: キャッシュ無効化（常に最新を取得）
          az storage blob upload \
            --account-name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --account-key "$ACCOUNT_KEY" \
            --container-name '$web' \
            --file dist/index.html \
            --name index.html \
            --content-cache-control "no-cache" \
            --overwrite true
          # その他のアセット（ハッシュ付きファイル名）: 長期キャッシュ
          az storage blob upload-batch \
            --account-name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --account-key "$ACCOUNT_KEY" \
            --destination '$web' \
            --source dist \
            --overwrite true \
            --content-cache-control "public, max-age=31536000, immutable" \
            --pattern "assets/*"
          # その他のファイル（favicon等）
          find dist -maxdepth 1 -type f ! -name "index.html" -print0 | while IFS= read -r -d '' file; do
            az storage blob upload \
              --account-name "${{ env.STORAGE_ACCOUNT_NAME }}" \
              --account-key "$ACCOUNT_KEY" \
              --container-name '$web' \
              --file "$file" \
              --name "$(basename "$file")" \
              --overwrite true
          done

      - name: Show frontend URL
        run: |
          WEB_ENDPOINT=$(az storage account show \
            --name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "primaryEndpoints.web" \
            -o tsv)
          echo "Frontend deployed to: ${WEB_ENDPOINT}"
