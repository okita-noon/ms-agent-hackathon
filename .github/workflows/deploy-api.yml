name: Deploy API to Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch:

env:
  ACR_NAME: acrorderaidev2
  ACR_LOGIN_SERVER: acrorderaidev2.azurecr.io
  IMAGE_NAME: orderai-api
  RESOURCE_GROUP: rg-orderai-dev2
  CONTAINER_APP_NAME: ca-api-orderai-dev2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" -f Dockerfile .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.IMAGE_TAG }}" \
            --min-replicas 1

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed to: https://$FQDN"
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"
